  <div class="prose w-10/12 lg:w-6/12 mb-4"><p>參考至 <a href="https://medium.com/@kelishrestha97/how-to-install-font-awesome-with-yarn-in-rails-6-0-c2506543c13d">此篇教學</a>，額外透過此篇文章紀錄安裝方法。<br />
1.首先透過 <code class="language-plaintext highlighter-rouge">yarn</code> 安裝</p>

<figure class="highlight"><pre><code class="language-ruby" data-lang="ruby"><span class="n">yarn</span> <span class="n">add</span> <span class="vi">@fortawesome</span><span class="o">/</span><span class="n">fontawesome</span><span class="o">-</span><span class="n">free</span></code></pre></figure>

<p>2.再匯入 <code class="language-plaintext highlighter-rouge">application.scss</code>（也可以另外建立<code class="language-plaintext highlighter-rouge">font-awesome.scss</code>再額外<code class="language-plaintext highlighter-rouge">import</code>）</p>

<figure class="highlight"><pre><code class="language-ruby" data-lang="ruby"><span class="c1">#application.scss</span>
<span class="vg">$fa</span><span class="o">-</span><span class="n">font</span><span class="o">-</span><span class="ss">path: </span><span class="s1">'@fortawesome/fontawesome-free/webfonts'</span><span class="p">;</span>
<span class="vi">@import</span> <span class="s1">'@fortawesome/fontawesome-free/scss/fontawesome'</span><span class="p">;</span>
<span class="vi">@import</span> <span class="s1">'@fortawesome/fontawesome-free/scss/solid'</span><span class="p">;</span>
<span class="vi">@import</span> <span class="s1">'@fortawesome/fontawesome-free/scss/regular'</span><span class="p">;</span>
<span class="vi">@import</span> <span class="s1">'@fortawesome/fontawesome-free/scss/brands'</span><span class="p">;</span>
<span class="vi">@import</span> <span class="s1">'@fortawesome/fontawesome-free/scss/v4-shims'</span><span class="p">;</span></code></pre></figure>

<p>3.再修改 <code class="language-plaintext highlighter-rouge">application.js</code></p>

<figure class="highlight"><pre><code class="language-ruby" data-lang="ruby"><span class="n">import</span> <span class="s2">"@fortawesome/fontawesome-free/js/all"</span><span class="p">;</span></code></pre></figure>

<p>4.搞定</p>

<figure class="highlight"><pre><code class="language-ruby" data-lang="ruby"><span class="o">&lt;</span><span class="n">i</span> <span class="k">class</span><span class="o">=</span><span class="s2">"fab fa-bootstrap"</span><span class="o">&gt;&lt;</span><span class="sr">/i&gt;</span></code></pre></figure>
