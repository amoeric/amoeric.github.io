<div class="post-card">
	<div class="post-card__content">
		<h2 class="post-card__title">
		<a href="{{site.baseurl}}{{post.url}}">{{ post.title }}</a>
		</h2>
		<p class="post-card__excerpt">
		   {{ post.excerpt | strip_html | strip_newlines | truncate: 160 }}
		</p>
		<div class="post-card__meta">
			<span class="post-card__date">
				{{ post.date | date: '%Y-%m-%d' }}
			</span>
			{% if post.tags.size > 0 %}
			<div class="post-card__tags">
				{% for tag in post.tags limit:3 %}
				<a class="post-card__tag" href="{{site.baseurl}}/tags.html#{{ tag | downcase }}">{{ tag }}</a>
				{% endfor %}
			</div>
			{% endif %}
		</div>
	</div>
	{% if post.image %}
	<div class="post-card__image">
		<a href="{{site.baseurl}}{{post.url}}">
		<img src="{% if post.image contains "://" %}{{ post.image }}{% else %}{{ site.baseurl }}/{{ post.image }}{% endif %}" alt="{{ post.title }}">
		</a>
	</div>
	{% endif %}
</div>
