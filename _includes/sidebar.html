{% assign author = site.authors['amoeric'] %}
<div class="author-box">
    {% if author.avatar %}
    <img src="{{site.baseurl}}/{{author.avatar}}" alt="{{author.name}}">
    {% endif %}
    <div class="author-info">
        <h5>{{ author.name }}</h5>
        <p>{{ author.bio }}</p>
    </div>
</div>
